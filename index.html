<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini File System</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;padding:2rem 1rem}
  .app{max-width:820px;margin:0 auto}

  .header{display:flex;align-items:center;gap:14px;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid #1e2230}
  .header-icon{width:48px;height:48px;background:linear-gradient(135deg,#3b82f6,#1d4ed8);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .header-icon svg{width:24px;height:24px;fill:white}
  .header h1{font-size:20px;font-weight:600;color:#f1f3f9}
  .header p{font-size:13px;color:#6b7280;margin-top:3px}

  .menu-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:2rem}
  .menu-btn{background:#161b27;border:1px solid #1e2230;border-radius:14px;padding:1.2rem;cursor:pointer;text-align:right;transition:all 0.2s;display:flex;flex-direction:column;gap:8px}
  .menu-btn:hover{background:#1a2035;border-color:#3b82f6;transform:translateY(-2px)}
  .menu-btn .icon{font-size:24px}
  .menu-btn .label{font-size:14px;font-weight:600;color:#e8eaf0}
  .menu-btn .desc{font-size:12px;color:#6b7280}

  .screen{background:#161b27;border:1px solid #1e2230;border-radius:16px;padding:1.5rem}
  .screen-header{display:flex;align-items:center;gap:12px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #1e2230}
  .back-btn{background:#0f1117;border:1px solid #1e2230;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;color:#9ca3af;font-family:inherit}
  .back-btn:hover{border-color:#3b82f6;color:#3b82f6}
  .screen-title{font-size:15px;font-weight:600;color:#f1f3f9}
  .count-badge{display:inline-block;background:#1e2230;color:#9ca3af;font-size:12px;padding:2px 8px;border-radius:6px;margin-right:8px}

  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:12px;color:#9ca3af;margin-bottom:6px;font-weight:500}
  .form-group input{width:100%;padding:10px 12px;border:1px solid #1e2230;border-radius:8px;background:#0f1117;color:#e8eaf0;font-size:13px;font-family:inherit;transition:border-color 0.2s}
  .form-group input:focus{outline:none;border-color:#3b82f6}
  .form-group input::placeholder{color:#374151}

  .btn-primary{background:#3b82f6;color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit;transition:background 0.2s}
  .btn-primary:hover{background:#2563eb}
  .btn-danger{background:#dc2626;color:white;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  .btn-danger:hover{background:#b91c1c}
  .btn-cancel{background:#1e2230;color:#9ca3af;border:1px solid #374151;border-radius:8px;padding:10px 20px;cursor:pointer;font-size:13px;font-family:inherit}

  .msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-top:14px}
  .msg.success{background:#052e16;color:#86efac;border:1px solid #166534}
  .msg.error{background:#1c0a0a;color:#fca5a5;border:1px solid #7f1d1d}

  table{width:100%;border-collapse:collapse;font-size:13px}
  thead th{text-align:right;padding:10px 12px;color:#6b7280;font-weight:500;border-bottom:1px solid #1e2230;background:#0f1117;font-size:12px}
  tbody tr{border-bottom:1px solid #1a1f2e;transition:background 0.15s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:#1a2035}
  tbody td{padding:11px 12px;color:#d1d5db}

  .file-tag{display:inline-block;background:#1e3a5f;color:#60a5fa;font-size:11px;padding:3px 9px;border-radius:5px;font-weight:500}
  .empty-state{text-align:center;padding:3rem;color:#4b5563}
  .empty-state .big{font-size:40px;margin-bottom:12px}
  .empty-state p{font-size:14px}

  .result-card{background:#0f1117;border:1px solid #1e2230;border-radius:12px;padding:1.2rem;margin-top:16px}
  .result-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1f2e;font-size:13px}
  .result-row:last-child{border-bottom:none}
  .result-row .k{color:#6b7280}
  .result-row .v{color:#e8eaf0;font-weight:500}

  .confirm-card{background:#1c1205;border:1px solid #854d0e;border-radius:12px;padding:14px 16px;margin-top:16px;font-size:13px;color:#fcd34d}
  .confirm-card .actions{display:flex;gap:10px;margin-top:12px}

  @media(max-width:500px){
    .menu-grid{grid-template-columns:1fr 1fr}
    .header h1{font-size:17px}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
    </div>
    <div>
      <h1>Mini File System</h1>
      <p>نظام إدارة الملفات المصغر</p>
    </div>
  </div>
  <div id="menu-area"></div>
  <div id="screen-area"></div>
</div>

<script>
const KEY='mfs_data';
const get=()=>{try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}};
const save=d=>{localStorage.setItem(KEY,JSON.stringify(d))};
const fmt=b=>{if(b>=1048576)return(b/1048576).toFixed(1)+' MB';if(b>=1024)return(b/1024).toFixed(1)+' KB';return b+' B'};

function showMenu(){
  document.getElementById('screen-area').innerHTML='';
  document.getElementById('menu-area').innerHTML=`
    <div class="menu-grid">
      <button class="menu-btn" onclick="showAll()">
        <div class="icon">📂</div>
        <div class="label">عرض الملفات</div>
        <div class="desc">عرض كل السجلات</div>
      </button>
      <button class="menu-btn" onclick="showAdd()">
        <div class="icon">➕</div>
        <div class="label">إضافة ملف</div>
        <div class="desc">تسجيل ملف جديد</div>
      </button>
      <button class="menu-btn" onclick="showDelete()">
        <div class="icon">🗑️</div>
        <div class="label">حذف ملف</div>
        <div class="desc">حذف سجل بالاسم</div>
      </button>
      <button class="menu-btn" onclick="showFind()">
        <div class="icon">🔍</div>
        <div class="label">بحث عن ملف</div>
        <div class="desc">البحث بالاسم</div>
      </button>
    </div>`;
}

function setScreen(html){
  document.getElementById('menu-area').innerHTML='';
  document.getElementById('screen-area').innerHTML=html;
}

function showAll(){
  const r=get();
  const rows=r.length===0
    ?`<tr><td colspan="4"><div class="empty-state"><div class="big">📭</div><p>لا توجد ملفات في النظام حتى الآن</p></div></td></tr>`
    :r.map(f=>`<tr><td><span class="file-tag">${f.n}</span></td><td style="color:#9ca3af">${f.p}</td><td>${fmt(f.s)}</td><td>${f.d}</td></tr>`).join('');
  setScreen(`
    <div class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="showMenu()">← رجوع</button>
        <span class="screen-title">قائمة الملفات <span class="count-badge">${r.length}</span></span>
      </div>
      <table>
        <thead><tr><th>اسم الملف</th><th>المسار</th><th>الحجم</th><th>تاريخ الإنشاء</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`);
}

function showAdd(){
  setScreen(`
    <div class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="showMenu()">← رجوع</button>
        <span class="screen-title">إضافة ملف جديد</span>
      </div>
      <div class="form-group"><label>اسم الملف</label><input id="fn" placeholder="مثال: report.pdf"></div>
      <div class="form-group"><label>المسار</label><input id="fp" placeholder="مثال: /Documents/"></div>
      <div class="form-group"><label>الحجم (بالبايت)</label><input id="fs" type="number" placeholder="مثال: 2048"></div>
      <div class="form-group"><label>تاريخ الإنشاء (YYYY-MM-DD)</label><input id="fd" placeholder="مثال: 2025-04-19"></div>
      <button class="btn-primary" onclick="addFile()">إضافة الملف</button>
      <div id="add-msg"></div>
    </div>`);
}

function addFile(){
  const n=document.getElementById('fn').value.trim();
  const p=document.getElementById('fp').value.trim();
  const s=parseInt(document.getElementById('fs').value)||0;
  const d=document.getElementById('fd').value.trim();
  if(!n||!p||!d){document.getElementById('add-msg').innerHTML='<div class="msg error">من فضلك املأ جميع الحقول</div>';return}
  const r=get();r.push({n,p,s,d});save(r);
  document.getElementById('add-msg').innerHTML=`<div class="msg success">تم إضافة الملف [${n}] بنجاح ✓</div>`;
  ['fn','fp','fs','fd'].forEach(id=>document.getElementById(id).value='');
}

function showFind(){
  setScreen(`
    <div class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="showMenu()">← رجوع</button>
        <span class="screen-title">البحث عن ملف</span>
      </div>
      <div class="form-group"><label>اسم الملف</label><input id="sn" placeholder="اكتب اسم الملف..." onkeydown="if(event.key==='Enter')findFile()"></div>
      <button class="btn-primary" onclick="findFile()">بحث 🔍</button>
      <div id="find-res"></div>
    </div>`);
}

function findFile(){
  const name=document.getElementById('sn').value.trim();
  if(!name)return;
  const f=get().find(r=>r.n===name);
  document.getElementById('find-res').innerHTML=f
    ?`<div class="result-card">
        <div class="result-row"><span class="k">اسم الملف</span><span class="v">${f.n}</span></div>
        <div class="result-row"><span class="k">المسار</span><span class="v">${f.p}</span></div>
        <div class="result-row"><span class="k">الحجم</span><span class="v">${fmt(f.s)} (${f.s} bytes)</span></div>
        <div class="result-row"><span class="k">تاريخ الإنشاء</span><span class="v">${f.d}</span></div>
      </div>`
    :`<div class="msg error">الملف [${name}] غير موجود في النظام</div>`;
}

function showDelete(){
  setScreen(`
    <div class="screen">
      <div class="screen-header">
        <button class="back-btn" onclick="showMenu()">← رجوع</button>
        <span class="screen-title">حذف ملف</span>
      </div>
      <div class="form-group"><label>اسم الملف المراد حذفه</label><input id="dn" placeholder="اكتب اسم الملف..."></div>
      <button class="btn-primary" onclick="searchDel()">بحث</button>
      <div id="del-res"></div>
    </div>`);
}

function searchDel(){
  const name=document.getElementById('dn').value.trim();
  if(!name)return;
  const f=get().find(r=>r.n===name);
  document.getElementById('del-res').innerHTML=f
    ?`<div class="confirm-card">
        تم العثور على: <strong>${f.n}</strong> — ${f.p}<br>هل أنت متأكد من الحذف؟
        <div class="actions">
          <button class="btn-danger" onclick="confirmDel('${name}')">نعم، احذف</button>
          <button class="btn-cancel" onclick="showDelete()">إلغاء</button>
        </div>
      </div>`
    :`<div class="msg error">الملف [${name}] غير موجود في النظام</div>`;
}

function confirmDel(name){
  save(get().filter(r=>r.n!==name));
  document.getElementById('del-res').innerHTML=`<div class="msg success">تم حذف الملف [${name}] بنجاح ✓</div>`;
}

showMenu();
</script>
</body>
</html>
